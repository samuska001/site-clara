<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para o meu amor ❤️</title>

<style>
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body, html {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background-color: #000;
        overflow: hidden;
        color: white;
    }

    /* Fundo da tela de bloqueio */
    .bg-fundo-bloqueio {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: url("fundo.jpg") center center no-repeat;
        background-size: cover;
        z-index: 10;
        transition: transform 1s ease-in-out, opacity 1s;
    }

    .bloqueio-container {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
        z-index: 20;
        background: rgba(0, 0, 0, 0.2);
    }

    .card {
        background: rgba(0, 0, 0, 0.7);
        padding: 40px 25px;
        border-radius: 25px;
        text-align: center;
        width: 85%;
        max-width: 320px;
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* Efeito de pulsar no botão */
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }

    .btn-entrar {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 15px;
        font-size: 18px;
        background: #ff4f7b;
        color: white;
        font-weight: bold;
        cursor: pointer;
        animation: pulse 2s infinite;
    }

    input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        border: none;
        font-size: 20px;
        text-align: center;
        background: white;
        color: #333;
    }

    /* --- ÁLBUM ESTILO STORIES --- */
    .album {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: none;
        z-index: 30;
    }

    /* Barrinhas de progresso no topo */
    .progresso-container {
        position: absolute;
        top: 10px;
        left: 0;
        width: 100%;
        display: flex;
        padding: 0 10px;
        gap: 5px;
        z-index: 100;
    }

    .barra {
        height: 3px;
        background: rgba(255, 255, 255, 0.3);
        flex: 1;
        border-radius: 2px;
        overflow: hidden;
    }

    .barra-preenchida {
        height: 100%;
        background: white;
        width: 0%;
        transition: width 0.3s linear;
    }

    .barra-ativa .barra-preenchida { width: 100%; }

    .foto {
        position: absolute;
        width: 100%; height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    .foto.ativa { opacity: 1; }

    /* Áreas de toque para navegação */
    .nav-touch {
        position: absolute;
        top: 0; height: 100%;
        z-index: 50;
    }
    .touch-left { left: 0; width: 30%; } /* Área para voltar */
    .touch-right { right: 0; width: 70%; } /* Área para avançar */

    .seta-proxima {
        position: absolute;
        top: 50%; right: 15px;
        transform: translateY(-50%);
        font-size: 40px;
        color: rgba(255, 255, 255, 0.5);
        z-index: 40;
        pointer-events: none;
    }
</style>
</head>

<body>

<audio id="musica" src="musica.mp3" loop></audio>

<div id="bgFundoBloqueio" class="bg-fundo-bloqueio"></div>

<div id="telaBloqueioContainer" class="bloqueio-container">
    <div class="card">
        <h2 id="titulo">Um presente para Clara 🎀</h2>
        <p id="subtitulo">Quantos dias tchugueders?</p>
        <input type="number" id="resposta" pattern="\d*" inputmode="numeric" placeholder="000">
        <button class="btn-entrar" onclick="verificar()">Abrir presente 🎁</button>
    </div>
</div>

<div id="album" class="album">
    <div id="progresso" class="progresso-container"></div>
    
    <div class="nav-touch touch-left" onclick="voltarFoto()"></div>
    <div class="nav-touch touch-right" onclick="proximaFoto()"></div>

    <img id="fotoAtual" class="foto" src="">
    <div id="setaProxima" class="seta-proxima">❯</div>
</div>

<script>
const diasCorretos = 411;
let fotos = ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg", "foto6.jpg", "foto7.jpg", "foto8.jpg", "foto9.jpg"];
let index = 0;

// 1. Pré-carregamento automático das fotos
fotos.forEach(src => {
    const img = new Image();
    img.src = src;
});

// Criar as barrinhas de progresso dinamicamente
const progressoContainer = document.getElementById("progresso");
fotos.forEach(() => {
    const div = document.createElement("div");
    div.className = "barra";
    div.innerHTML = '<div class="barra-preenchida"></div>';
    progressoContainer.appendChild(div);
});

function verificar() {
    let valor = document.getElementById("resposta").value;
    if (parseInt(valor) === diasCorretos) {
        document.getElementById("bgFundoBloqueio").style.opacity = "0";
        setTimeout(() => {
            document.getElementById("bgFundoBloqueio").style.display = "none";
            document.getElementById("telaBloqueioContainer").style.display = "none";
            document.getElementById("album").style.display = "block";
            atualizarTela();
            document.getElementById("musica").play();
        }, 1000);
    } else {
        // Feedback de erro mais suave
        const btn = document.querySelector('.btn-entrar');
        btn.style.background = "#333";
        btn.innerText = "Data errada... ❌";
        setTimeout(() => {
            btn.style.background = "#ff4f7b";
            btn.innerText = "Abrir presente 🎁";
        }, 2000);
    }
}

function atualizarTela() {
    const fotoElemento = document.getElementById("fotoAtual");
    const seta = document.getElementById("setaProxima");
    const barras = document.querySelectorAll(".barra");

    fotoElemento.classList.remove("ativa");
    
    setTimeout(() => {
        fotoElemento.src = fotos[index];
        fotoElemento.classList.add("ativa");
    }, 50);

    // Atualiza barrinhas de progresso
    barras.forEach((barra, i) => {
        if (i <= index) barra.classList.add("barra-ativa");
        else barra.classList.remove("barra-ativa");
    });

    seta.style.display = (index === fotos.length - 1) ? "none" : "block";
}

function proximaFoto() {
    if (index < fotos.length - 1) {
        index++;
        atualizarTela();
    }
}

function voltarFoto() {
    if (index > 0) {
        index--;
        atualizarTela();
    }
}
</script>

</body>
</html>
